<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Drive Music Player</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; padding: 20px; }
        .player-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; }
        #currentTrack { font-size: 0.9em; color: #666; margin-bottom: 15px; text-align: center; min-height: 1.2em; }
        audio { width: 100%; margin-bottom: 20px; }
        ul { list-style: none; padding: 0; max-height: 300px; overflow-y: auto; border-top: 1px solid #eee; }
        li { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s; }
        li:hover { background: #f0f0f0; }
        li.active { background: #e3f2fd; color: #1976d2; font-weight: bold; }
    </style>
</head>
<body>

<div class="player-container">
    <h2>🎵 My Playlist</h2>
    <div id="currentTrack">Φόρτωση λίστας...</div>
    
    <audio id="audioPlayer" controls>
        Το πρόγραμμα περιήγησής σας δεν υποστηρίζει το στοιχείο ήχου.
    </audio>

    <ul id="playlist">Περιμένετε...</ul>
</div>

<script>
    // 1. ΡΥΘΜΙΣΕΙΣ - Βάλε εδώ το URL από το Google Apps Script (Deploy -> Web App)
    const scriptURL = "https://script.google.com/macros/s/AKfycby9j8vf8-ZQcP6bu_kM4gYwcn7tliW6OC2NGIeGrizpKtpP4geLbMk1FWT4uBl_7p1x/exec";
    
    const audioPlayer = document.getElementById('audioPlayer');
    const playlistElement = document.getElementById('playlist');
    const currentTrackText = document.getElementById('currentTrack');
    
    let allSongs = [];
    let currentIndex = parseInt(localStorage.getItem('lastPlayedIndex')) || 0;

    // 2. ΑΡΧΙΚΟ FETCH: Παίρνουμε τη λίστα των τραγουδιών (JSON)
    fetch(scriptURL)
        .then(response => {
            if (!response.ok) throw new Error("Σφάλμα σύνδεσης");
            return response.json();
        })
        .then(songs => {
            if (songs.error) throw new Error(songs.error);
            
            allSongs = songs;
            renderPlaylist();
            
            if (allSongs.length > 0) {
                // Φόρτωση του τελευταίου τραγουδιού στη μνήμη (χωρίς αυτόματο play)
                loadSong(currentIndex);
            }
        })
        .catch(err => {
            console.error(err);
            currentTrackText.textContent = "❌ Σφάλμα στη φόρτωση";
            playlistElement.innerHTML = "<li>Αδυναμία σύνδεσης με το Google Drive.</li>";
        });

    // 3. ΕΜΦΑΝΙΣΗ ΛΙΣΤΑΣ ΣΤΗΝ ΟΘΟΝΗ
    function renderPlaylist() {
        playlistElement.innerHTML = "";
        allSongs.forEach((song, index) => {
            const li = document.createElement('li');
            li.textContent = (index + 1) + ". " + song.name;
            li.id = "song-" + index;
            if (index === currentIndex) li.classList.add('active');
            
            li.onclick = () => playSong(index);
            playlistElement.appendChild(li);
        });
    }

    // 4. ΦΟΡΤΩΣΗ ΤΡΑΓΟΥΔΙΟΥ (Χωρίς αναπαραγωγή)
    function loadSong(index) {
        currentIndex = index;
        const song = allSongs[index];
        //const streamURL = `https://docs.google.com/uc?export=open&id=${song.id}`;
        const streamURL = https://drive.google.com/uc?export=download&id=${song.id}&confirm=no_antivirus;
        
        audioPlayer.src = streamURL;
        currentTrackText.textContent = "Έτοιμο: " + song.name;
        updateVisuals();
    }

    // 5. ΑΝΑΠΑΡΑΓΩΓΗ ΤΡΑΓΟΥΔΙΟΥ
    function playSong(index) {
        currentIndex = index;
        const song = allSongs[index];
        localStorage.setItem('lastPlayedIndex', index);
        
        const streamURL = `https://docs.google.com/uc?export=open&id=${song.id}`;
        
        audioPlayer.src = streamURL;
        currentTrackText.textContent = "▶️ Παίζει: " + song.name;
        
        updateVisuals();
        audioPlayer.play().catch(e => console.log("Απαιτείται κλικ για έναρξη"));
    }

    // 6. ΕΝΗΜΕΡΩΣΗ ΟΠΤΙΚΗΣ ΛΙΣΤΑΣ (Active class)
    function updateVisuals() {
        document.querySelectorAll('li').forEach(li => li.classList.remove('active'));
        const activeLi = document.getElementById("song-" + currentIndex);
        if (activeLi) {
            activeLi.classList.add('active');
            activeLi.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }

    // 7. ΑΥΤΟΜΑΤΗ ΜΕΤΑΒΑΣΗ ΣΤΟ ΕΠΟΜΕΝΟ (On Ended)
    audioPlayer.onended = function() {
        let nextIndex = currentIndex + 1;
        if (nextIndex < allSongs.length) {
            playSong(nextIndex);
        } else {
            playSong(0); // Επιστροφή στην αρχή
        }
    };
</script>

</body>
</html>
