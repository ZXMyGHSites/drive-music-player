<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>My Drive Music Player (Pro)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #eef2f5; padding: 20px; }
        .player-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: inline-block; min-width: 320px; }
        #playlist { list-style: none; padding: 0; margin-top: 20px; text-align: left; max-height: 300px; overflow-y: auto; }
        #playlist li { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        #playlist li:hover { background: #f0f7ff; }
        .active { color: #2da44e; font-weight: bold; background: #f0fff4; border-left: 4px solid #2da44e; }
        audio { width: 100%; margin-top: 15px; }
        .status-tag { font-size: 0.8em; color: #666; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="player-container">
    <h2>🎵 My Drive Player</h2>
    <h3 id="currentTrack">Φόρτωση...</h3>
    <audio id="audioPlayer" controls>
        Το πρόγραμμα περιήγησής σας δεν υποστηρίζει το στοιχείο ήχου.
    </audio>
    <span class="status-tag" id="status">Η θέση αποθηκεύεται αυτόματα</span>
    <ul id="playlist">Περιμένετε...</ul>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwmpP_TFEKk7ZqINIMRHs_-26Mp0S1K18kLvS9IzV-ICINUn_biSfE-j_nOJz3RdSs-/exec"; // <-- Βάλε το δικό σου URL
    const playlistElement = document.getElementById('playlist');
    const audioPlayer = document.getElementById('audioPlayer');
    const currentTrackText = document.getElementById('currentTrack');

    let allSongs = [];
    
    // 1. Διάβασμα της τελευταίας θέσης από τη μνήμη του browser
    let currentIndex = parseInt(localStorage.getItem('lastPlayedIndex')) || 0;

    // 1. Καλούμε το Google Script χωρίς παραμέτρους για να πάρουμε τη λίστα (JSON)
    fetch(scriptURL)
        .then(response => {
            if (!response.ok) throw new Error("Σφάλμα δικτύου");
            return response.json(); // Μετατρέπει την απάντηση σε αντικείμενο JavaScript
        })
        .then(songs => {
            allSongs = songs; // Αποθηκεύουμε τη λίστα στον πίνακα allSongs
            playlistElement.innerHTML = ""; // Καθαρίζουμε το μήνυμα "Περιμένετε..."
    
            // 2. Δημιουργούμε τη λίστα στην οθόνη
            songs.forEach((song, index) => {
                const li = document.createElement('li');
                li.textContent = (index + 1) + ". " + song.name;
                
                // Όταν κάνουμε κλικ, καλείται η playSong που φτιάξαμε πριν
                li.onclick = () => playSong(index);
                
                playlistElement.appendChild(li);
            });
    
            // 3. Προετοιμάζουμε το τραγούδι που θυμόμαστε από το localStorage
            if (allSongs.length > 0) {
                // Αν το currentIndex από το localStorage είναι άκυρο, βάλε 0
                if (currentIndex >= allSongs.length) currentIndex = 0;
                loadSong(currentIndex); 
            }
        })
        .catch(err => {
            console.error("Λεπτομέρειες σφάλματος:", err);
            playlistElement.innerHTML = "❌ Αδυναμία σύνδεσης με τη λίστα τραγουδιών.";
        });

    // 2. Φόρτωση τραγουδιού χωρίς απαραίτητα αυτόματη εκκίνηση (για την πρώτη φόρτωση)
    // 1. Η function loadSong (Προετοιμασία)
    function loadSong(index) {
        currentIndex = index;
        const song = allSongs[index];
        
        // Ενημερώνουμε το κείμενο και τη λίστα χωρίς να ξεκινήσουμε το fetch ακόμα
        currentTrackText.textContent = "Επιλεγμένο: " + song.name;
        updateVisualList(index);
        localStorage.setItem('lastPlayedIndex', index);
    }
    
    // 2. Η function playSong (Η καρδιά του Player)
    async function playSong(index) {
        currentIndex = index;
        const song = allSongs[index];
        
        // Αποθήκευση στη μνήμη του browser
        localStorage.setItem('lastPlayedIndex', index);
        updateVisualList(index);
        
        // Οπτική ειδοποίηση φόρτωσης
        currentTrackText.textContent = "⏳ Φόρτωση: " + song.name + "...";
    
        try {
            // Ζητάμε το τραγούδι από το Google Script ως Base64 κείμενο
            const response = await fetch(`${scriptURL}?fileId=${song.id}`);
            const base64Data = await response.text();
            
            if (base64Data.length < 100) { 
                throw new Error("Το αρχείο είναι πολύ μικρό ή κενό.");
            }
    
            // Μετατροπή σε Data URI για τον HTML5 Player
            const audioSrc = `data:audio/mpeg;base64,${base64Data}`;
            
            audioPlayer.src = audioSrc;
            
            // Μόλις φορτώσει το src, ξεκινάμε την αναπαραγωγή
            audioPlayer.play().then(() => {
                currentTrackText.textContent = "▶️ Παίζει: " + song.name;
            }).catch(e => {
                currentTrackText.textContent = "Πατήστε Play για έναρξη";
                console.log("Autoplay blocked:", e);
            });
    
        } catch (err) {
            console.error("Σφάλμα:", err);
            currentTrackText.textContent = "❌ Σφάλμα φόρτωσης τραγουδιού";
        }
    }

    function updateVisualList(index) {
        document.querySelectorAll('#playlist li').forEach(el => el.classList.remove('active'));
        if (playlistElement.children[index]) {
            playlistElement.children[index].classList.add('active');
            playlistElement.children[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }

    // 4. Αυτόματη συνέχεια στο επόμενο και ενημέρωση μνήμης
    audioPlayer.onended = function() {
        let nextIndex = currentIndex + 1;
        if (nextIndex >= allSongs.length) {
            nextIndex = 0; // Επιστροφή στην αρχή
        }
        playSong(nextIndex);
    };
</script>

</body>
</html>
